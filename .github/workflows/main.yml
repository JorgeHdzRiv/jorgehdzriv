name: Generate Datas

on:
  schedule:
    - cron: "0 */12 * * *" # Se ejecuta cada 12 horas
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # Trabajo 1: Animación de la serpiente
  # ---------------------------------------------------------
  snake-animation:
    name: Jobs to update snake data
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: jorgehdzriv
          svg_out_path: dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # Trabajo 2: Actualizar últimos proyectos/actividad
  # ---------------------------------------------------------
  update-activity:
    name: Update Latest Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        
      - name: Debug - Listar archivos del servidor
        run: ls -la # Este comando imprimirá todos los archivos en el log

      - name: Actualizar README con actividad
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Actualizando últimos proyectos"