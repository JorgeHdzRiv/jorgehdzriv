name: Generate Datas

on:
  schedule:
    - cron: "0 */12 * * *" # Se ejecuta cada 12 horas
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # Trabajo 1: Animación de la serpiente
  # ---------------------------------------------------------
  snake-animation:
    name: Jobs to update snake data
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: jorgehdzriv
          svg_out_path: dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # Trabajo 2: Actualizar últimos proyectos/actividad
  # ---------------------------------------------------------
  update-activity:
    name: Update Latest Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        
      - name: Debug - Listar archivos del servidor
        run: ls -la # Este comando imprimirá todos los archivos en el log

      - name: Actualizar README con actividad
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Actualizando últimos proyectos"
  # ---------------------------------------------------------
  # Trabajo 3: Actualizar Estadísticas con Python
  # ---------------------------------------------------------
  update-stats:
    name: Update Stats with Python
    needs: update-activity # Espera a que termine el trabajo anterior
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          ref: main
          
      - name: Configurar Entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar librerías (Pandas y Requests)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Ejecutar el script ETL
        run: python update_stats.py
        
      - name: Guardar y subir los cambios a GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Automatización: Estadísticas de lenguajes actualizadas" || echo "No hay cambios nuevos para subir"
          git push